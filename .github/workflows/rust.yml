name: Rust

on:
  push:
    paths: ["crates/**", "Cargo.toml", "Cargo.lock", "rust-toolchain.toml", ".github/workflows/rust.yml", "testdata/**"]
  pull_request:
    paths: ["crates/**", "Cargo.toml", "Cargo.lock", "rust-toolchain.toml", ".github/workflows/rust.yml", "testdata/**"]
  workflow_dispatch:

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      # wc3-confuse 独立于 workspace（mlua 的 lua51 与 lua54 feature 互斥，见根 Cargo.toml）
      - run: cargo fmt --manifest-path crates/wc3-confuse/Cargo.toml -- --check
      - run: cargo clippy --manifest-path crates/wc3-confuse/Cargo.toml --all-targets --locked -- -D warnings
